<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Contato</title>
</head>
<body>
    <header class="topo">
        <h1>PragaShop</h1>
        <div class="menu-hamburger">
            <input type="checkbox" id="checkbox_toggle" />
            <label for="checkbox_toggle" class="hamburger">&#9776;</label>
            <nav class="navbar">
                <ul class="menu"> 
                    <a href="./index.html"><li><button>Inicio</button></li></a>
                    <a href="./produtos.html"><li><button>Produtos</button></li></a>    
                    <a href="./contato.html"><li><button>Contatos</button></li></a>
                    <a href="./portifolio.html"><li><button>Portifolio</button></li></a>
                </ul>
            </nav>
    </div>
    </header>
    <main>
        <form class="formulario">
            <div class="contate-nos" id="contate-nos-titulo">
                <h2>Contate-nos</h2>
            </div>
            <div class="contate-nos" id="Nome">
                <label for="input-nome">Nome</label>
                <input id="input-nome" type="text" placeholder="Seu Nome">
            </div>
            <div class="contate-nos" id="Email">
                <label for="input-email">Email</label>
                <input id="input-email" type="email" placeholder="exemple@exp.com">
            </div>
            <div class="contate-nos" id="Assunto">
                <label for="input-assunto">Assunto</label>
                <input id="input-assunto" type="text" placeholder="Qual assunto gostaria de abordar?">
            </div>
            <div class="contate-nos" id="Mensagem">
                <label for="input-mensagem">Mensagem</label>
                <input id="input-mensagem" type="text" placeholder="Digite sua mensagem...">
            </div>
            <div class="contate-nos" id="botao">
                <button type="submit">Enviar</button>
            </div>
            <div class="contate-nos" id="Agradecimentos">
                <small>Agradecemos a sua atenção</small>
            </div>
        </form>
    </main>
</body>
</html>
