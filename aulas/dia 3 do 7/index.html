<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>Document</title>
</head>
<body>
    <div class="form-conteiner">
        <h2>Criar conta</h2>
        <form action="/enviar-cadastro">
            <div class="form-group"> <!---nome--->
                <label for="nome">Nome Completo</label> 
                <input type="text" id="nome" name="nome" placeholder="qual seu vulgo?" required/>
            </div>
            <div class="form-group"> <!---email--->
                <label for="email">Qual o seu email?</label>
                <input type="email" id="email" name="email" placeholder="examplo@exp.com" required>
            </div>
            <div class="form-group"> <!---senha--->
                <label for ="senha">Digite sua senha</label>
                <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required/>
            </div>
            <button type="submit" class="submit-btn">Cadastrar</button>
        </form>
    </div>
</body>
</html>
